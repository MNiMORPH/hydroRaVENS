# Cannon River catchment — hydroRaVENS calibration template
# Physical parameters are overridden by driver.py during calibration.
# spin_up_cycles: 0 here; driver.py performs spin-up after setting parameters.

timeseries:
  datafile: CannonTestInput.csv

initial_conditions:
  water_reservoir_effective_depths__mm:
    - 0.1     # shallow / interflow reservoir  (placeholder; overridden)
    - 100     # soil-zone reservoir             (placeholder; overridden)
    - 2000    # karst / bedrock reservoir       (placeholder; overridden)
  snowpack__mm_SWE: 0

catchment:
  drainage_basin_area__km2: 3800
  evapotranspiration_method: datafile
  water_year_start_month: 10   # USGS water year starts in October

general:
  spin_up_cycles: 0   # driver.py performs spin-up after setting calibrated parameters

reservoirs:
  e_folding_residence_times__days:
    - 16      # shallow   (placeholder; overridden by driver)
    - 200     # soil zone (placeholder; overridden by driver)
    - 3650    # karst     (placeholder; overridden by driver)
  exfiltration_fractions:
    - 0.8     # shallow: fraction to stream vs. percolating to soil zone (overridden)
    - 0.1     # soil zone: fraction to stream vs. recharging karst       (overridden)
    - 1.0     # karst: deepest layer, must be 1.0 for mass conservation
  maximum_effective_depths__mm:
    - .inf    # shallow: Hmax overridden by driver (saturation-excess threshold)
    - .inf    # soil zone: no saturation-excess threshold
    - .inf    # karst: no saturation-excess threshold

snowmelt:
  PDD_melt_factor: 1.0   # mm SWE per positive degC per day (placeholder; overridden)
  snow_insulation_k: 0.0 # mm⁻¹ SWE; 0 = no insulation; overridden by driver if active

modules:
  snowpack:      true
  frozen_ground: true
  rain_on_snow:  true
  direct_runoff: false   # Hortonian-inspired bypass; off by default (see params.yml)
