name: Publish to PyPI

# Triggered when a GitHub Release is published.
# Requires a Trusted Publisher to be registered on PyPI (one-time setup):
#   https://pypi.org/manage/account/publishing/
#   Owner:         MNiMORPH
#   Repository:    hydroRaVENS
#   Workflow file: publish.yml
#   Environment:   pypi
#
# Also create a "pypi" environment in the GitHub repo settings and enable
# required reviewers so every release gets a manual approval before upload.

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install build and twine
        run: pip install build twine
      - name: Build package
        run: python -m build
      - name: Check distribution
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hydroRaVENS
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
